<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Invictus Experiences</title>
  <link rel="canonical" href="https://www.invictusexperiences.com/">

  <!-- SEO -->
  <meta name="description" content="Invictus Experiences offers thrilling treks, serene campsites, and immersive travel experiences across India. Explore nature, challenge yourself, and create unforgettable adventures.">
  <meta name="keywords" content="Invictus Experiences, Trekking India, Camping Tours, Mountain Treks, Adventure Travel India">
  <meta name="robots" content="index, follow">
  <meta name="author" content="Invictus Experiences">

  <!-- Open Graph -->
  <meta property="og:title" content="Invictus Experiences">
  <meta property="og:description" content="Thrilling treks, serene campsites, and immersive travel experiences across India’s hidden gems.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.invictusexperiences.com/">
  <meta property="og:image" content="https://www.invictusexperiences.com/banner.jpg">
  <meta property="og:site_name" content="Invictus Experiences">
  <meta property="og:locale" content="en_IN">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Invictus Experiences">
  <meta name="twitter:description" content="Thrilling treks, serene campsites, and immersive travel experiences across India’s hidden gems.">
  <meta name="twitter:image" content="https://www.invictusexperiences.com/banner.jpg">

  <!-- Favicons -->
  <link rel="icon" href="/favicon.ico">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <!-- Font Awesome (Correct CDN) -->
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        crossorigin="anonymous"
        referrerpolicy="no-referrer">

  <!-- Structured Data -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Invictus Experiences",
    "url": "https://www.invictusexperiences.com",
    "logo": "https://www.invictusexperiences.com/logo.png",
    "sameAs": [
      "https://www.instagram.com/invictusexperiences",
      "https://www.linkedin.com/company/invictusexperiences/",
      "https://youtube.com/@invictusexperiences",
      "https://x.com/Invictusexp"
    ]
  }
  </script>

</head>

<body>

  <!-- Banner -->
  <header class="banner">
    <img src="https://1drv.ms/i/c/8bd057f5b83ff802/IQQxjJtGBmOHTZ_q9gLO081ZAVhAiFLRE38cw53LgJMpZgc?width=1024" alt="Invictus Experiences Adventure Banner">
  </header>

  <!-- Main Content -->
  <main class="main-container">

    <section class="content-box">

      <div class="launch-note">
        A New Era of Exploration Launching Soon
      </div>

      <h1 class="title">Invictus Experiences</h1>

      <p class="subtitle">
        Embark on thrilling treks, scenic camps, and unforgettable adventures across India’s hidden gems.
      </p>

      <!-- Subscribe -->
      <form class="subscribe-box" name="submit-to-google-sheet">

        <input type="text" name="Name" placeholder="Your Name" required>

        <input type="tel" name="Mobile" placeholder="Mobile Number" required>

        <input type="email" name="Email" placeholder="Email Address" required>

        <button type="submit">Notify Me</button>

      </form>

      <div id="msg"></div>

      <!-- Social -->
      <div class="social-icons">

        <a href="https://www.instagram.com/invictusexperiences" target="_blank" aria-label="Instagram">
          <i class="fab fa-instagram"></i>
        </a>

        <a href="https://www.linkedin.com/company/invictusexperiences/" target="_blank" aria-label="LinkedIn">
          <i class="fab fa-linkedin"></i>
        </a>

        <a href="https://youtube.com/@invictusexperiences" target="_blank" aria-label="YouTube">
          <i class="fab fa-youtube"></i>
        </a>

        <a href="https://x.com/Invictusexp" target="_blank" aria-label="X">
          <i class="fab fa-x-twitter"></i>
        </a>

      </div>

    </section>

  </main>

</body>
</html>
